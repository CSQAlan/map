services:
  elder-map-db:
    image: postgis/postgis:16-3.4
    container_name: elder-map-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: elder_map
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - elder_map_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d elder_map"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  elder_map_pgdata:
